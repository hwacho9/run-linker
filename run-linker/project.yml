name: RunLinker
options:
  bundleIdPrefix: com.runlinker
  deploymentTarget:
    iOS: "16.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.15.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  RunLinker:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
    info:
      path: App/Info.plist
    settings:
      CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: AuthenticationServices.framework
