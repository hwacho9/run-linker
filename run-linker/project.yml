name: RunLinker
options:
  bundleIdPrefix: com.runlinker
  knownRegions:
    - en
    - ko
    - ja
    - Base
  deploymentTarget:
    iOS: "18.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.15.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  RunLinker:
    type: application
    platform: iOS
    bundleId: com.valetudo.run-linker
    sources:
      - App
      - Core
      - Features
    resources:
      - Assets.xcassets
      - Resources
      - GoogleService-Info.plist
    info:
      path: App/Info.plist
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: run-linker.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: AuthenticationServices.framework
