name: RunLinker
options:
  bundleIdPrefix: com.runlinker
  deploymentTarget:
    iOS: "16.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.15.0 # Or appropriate version

targets:
  RunLinker:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
    settings:
      CODE_SIGN_IDENTITY: "iPhone Developer"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "" # To be filled by user later
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
